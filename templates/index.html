<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator NICI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #7f9eb4;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #2c3e50;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            color: #55ab82;
            margin-top: 0;
        }
        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .form-group label {
            width: 200px;
            font-weight: bold;
        }
        .form-group input, .form-group select {
            flex: 1;
            padding: 8px;
            border: 1px solid #55ab82;
            border-radius: 4px;
            background-color: #ecf0f1;
        }
        .checkbox-group {
            display: flex;
            gap: 20px;
            margin: 15px 0;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
        }
        .checkbox-item input {
            margin-right: 5px;
        }
        button {
            background-color: #55ab82;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            background-color: #3d8b66;
        }
        .results {
            margin-top: 20px;
            padding: 15px;
            background-color: #888888;
            border-radius: 4px;
            color: black;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            padding: 5px 0;
        }
        .error {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kalkulator zużycia nici</h1>

        <form method="POST">
            <div class="form-group">
                <label for="stitch_length">Długość ściegu [m]:</label>
                <input type="number" step="any" id="stitch_length" name="stitch_length"
                       value="{{ form_data.get('stitch_length', '1') }}" required>
            </div>

            <div class="form-group">
                <label for="stitch_density">Gęstość ściegu [na 10cm]:</label>
                <input type="number" step="any" id="stitch_density" name="stitch_density"
                       value="{{ form_data.get('stitch_density', '180') }}" required>
            </div>

            <div class="form-group">
                <label for="thread">Grubość nici:</label>
                <select id="thread" name="thread">
                    {% for choice in thread_choices %}
                        <option value="{{ choice }}" {% if form_data.get('thread') == choice %}selected{% endif %}>{{ choice }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="material">Materiał:</label>
                <select id="material" name="material">
                    {% for choice in material_choices %}
                        <option value="{{ choice }}" {% if form_data.get('material') == choice %}selected{% endif %}>{{ choice }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="layers">Ilość warstw:</label>
                <select id="layers" name="layers">
                    {% for choice in layers_choices %}
                        <option value="{{ choice }}" {% if form_data.get('layers') == choice %}selected{% endif %}>{{ choice }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="bobbin">Nawój w metrach:</label>
                <select id="bobbin" name="bobbin">
                    {% for choice in bobbin_choices %}
                        <option value="{{ choice }}" {% if form_data.get('bobbin') == choice %}selected{% endif %}>{{ choice }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="checkbox-group">
                <div class="checkbox-item">
                    <input type="checkbox" id="pas_poliestrowy" name="pas_poliestrowy"
                           {% if form_data.get('pas_poliestrowy') == 'on' %}checked{% endif %}>
                    <label for="pas_poliestrowy">Pas poliestrowy</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="pas_pvc" name="pas_pvc"
                           {% if form_data.get('pas_pvc') == 'on' %}checked{% endif %}>
                    <label for="pas_pvc">Pas PVC</label>
                </div>
            </div>

            <button type="submit">Oblicz</button>
        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        {% if result_metry is not none %}
            <div class="results">
                <div class="result-row">
                    <span>Zużycie nici:</span>
                    <span><strong>{{ result_metry }} m</strong></span>
                </div>
                <div class="result-row">
                    <span>Liczba szpulek:</span>
                    <span><strong>{{ result_szpule }}</strong></span>
                </div>
            </div>
        {% endif %}

        <div class="footer">
            Kalkulator NICI v0.01 (Flask)
        </div>
    </div>
</body>
</html>
